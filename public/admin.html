<!DOCTYPE html>
<html lang="sk" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrácia - Medvede na Slovensku</title>
    
    <script>
      (function () {
        try {
          var override = new URLSearchParams(location.search).get("theme");
          var t = override || localStorage.getItem("theme");
          var dark =
            t === "dark" ||
            (!t && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐻</text></svg>"
    />
    <style>
      .admin-container {
        max-width: 760px;
        margin: 4rem auto;
        padding: 2rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
      }
      .admin-container h1 {
        margin-top: 0;
        margin-bottom: 1.5rem;
        font-family: 'Newsreader', serif;
        font-size: 2rem;
      }
      .admin-lede {
        margin: 0 0 2rem;
      }
      .admin-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        margin: 0 0 2rem;
      }
      .admin-stat {
        padding: 1rem 1.1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: color-mix(in srgb, var(--surface) 88%, var(--bg) 12%);
      }
      .admin-stat-value {
        display: block;
        font-family: 'Newsreader', serif;
        font-size: 1.65rem;
        font-weight: 600;
        line-height: 1.1;
        color: var(--accent);
      }
      .admin-stat-label {
        display: block;
        margin-top: 0.4rem;
        color: var(--ink-3);
        font-size: 0.88rem;
      }
      .admin-status-line {
        margin-top: 0.9rem;
        font-size: 0.92rem;
        color: var(--ink-3);
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }
      .form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg);
        color: var(--text);
        font-family: inherit;
        font-size: 1rem;
      }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--accent);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: var(--radius-md);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn-primary:hover {
        opacity: 0.9;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #statusMessage {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: var(--radius-md);
        display: none;
      }
      #statusMessage.success {
        display: block;
        background: rgba(34, 197, 94, 0.1);
        color: #15803d;
        border: 1px solid rgba(34, 197, 94, 0.2);
      }
      #statusMessage.error {
        display: block;
        background: rgba(239, 68, 68, 0.1);
        color: #b91c1c;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }
      [data-theme="dark"] #statusMessage.success {
        color: #4ade80;
      }
      [data-theme="dark"] #statusMessage.error {
        color: #f87171;
      }
      @media (max-width: 560px) {
        .admin-stats {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand-mark"><i class="ph ph-paw-print"></i></span>
        <span class="brand-name">Medvede na Slovensku</span>
      </a>
    </header>

    <main>
      <div class="admin-container">
        <h1>Administrácia</h1>
        <p class="muted admin-lede">
          Manuálne spustenie sťahovania dát zo zdrojov (tumedved.sk a Google News).
        </p>

        <div class="admin-stats" id="adminStats" aria-live="polite">
          <div class="admin-stat">
            <span class="admin-stat-value" id="adminSightingsCount">—</span>
            <span class="admin-stat-label">uložených hlásení</span>
          </div>
          <div class="admin-stat">
            <span class="admin-stat-value" id="adminNewsCount">—</span>
            <span class="admin-stat-label">uložených správ</span>
          </div>
          <div class="admin-stat">
            <span class="admin-stat-value" id="adminRefreshState">—</span>
            <span class="admin-stat-label">stav obnovovania</span>
          </div>
          <div class="admin-stat">
            <span class="admin-stat-value" id="adminSupabaseState">—</span>
            <span class="admin-stat-label">Supabase</span>
          </div>
        </div>

        <p class="admin-status-line" id="adminStatsMeta"></p>

        <form id="adminForm">
          <button type="submit" class="btn-primary" id="runBtn">
            <i class="ph ph-arrows-clockwise"></i>
            <span>Spustiť sťahovanie</span>
          </button>
        </form>

        <div id="statusMessage"></div>
      </div>
    </main>

    <script>
      const statsMeta = document.getElementById('adminStatsMeta');
      const form = document.getElementById('adminForm');
      const runBtn = document.getElementById('runBtn');
      const statusMsg = document.getElementById('statusMessage');

      const formatDateTime = (value) => {
        if (!value) return '—';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '—';
        return new Intl.DateTimeFormat('sk-SK', {
          dateStyle: 'medium',
          timeStyle: 'short',
        }).format(date);
      };

      const formatCount = (value) => {
        if (!Number.isFinite(value)) return '—';
        return value.toLocaleString('sk-SK');
      };

      const setText = (id, value) => {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
      };

      const renderStats = (status) => {
        const sightings = status?.sightings || {};
        const news = status?.news || {};
        const refreshState = [sightings.refreshing ? 'hlásenia bežia' : null, news.refreshing ? 'správy bežia' : null]
          .filter(Boolean)
          .join(' · ') || 'idle';
        const latestUpdateCandidates = [sightings.fetchedAt, news.fetchedAt].filter(Boolean).sort();
        const latestUpdate = latestUpdateCandidates[latestUpdateCandidates.length - 1] || null;

        setText('adminSightingsCount', formatCount(sightings.count));
        setText('adminNewsCount', formatCount(news.count));
        setText('adminRefreshState', refreshState);
        setText('adminSupabaseState', status?.supabaseConfigured ? 'pripojené' : 'nepripojené');

        const details = [];
        details.push(`Posledná aktualizácia: ${formatDateTime(latestUpdate)}`);
        if (sightings.error || news.error) {
          details.push(`Chyba: ${sightings.error || news.error}`);
        } else {
          details.push(`Režim: ${status?.refreshMode || '—'}`);
        }

        if (statsMeta) statsMeta.textContent = details.join(' · ');
      };

      const loadStats = async () => {
        try {
          const res = await fetch('/api/status');
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          renderStats(await res.json());
        } catch (err) {
          if (statsMeta) statsMeta.textContent = `Statistiky sa nepodarilo načítať: ${err.message}`;
        }
      };

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        runBtn.disabled = true;
        runBtn.querySelector('span').textContent = 'Sťahujem...';
        statusMsg.className = '';
        statusMsg.style.display = 'none';

        try {
          const res = await fetch('/api/admin/refresh', { method: 'POST' });
          const data = await res.json();

          if (res.ok && data.ok) {
            statusMsg.textContent = 'Sťahovanie úspešne dokončené.';
            statusMsg.className = 'success';
            renderStats(data);
          } else {
            statusMsg.textContent = 'Chyba: ' + (data.error || 'Neznáma chyba');
            statusMsg.className = 'error';
          }
        } catch (err) {
          statusMsg.textContent = 'Chyba siete: ' + err.message;
          statusMsg.className = 'error';
        } finally {
          runBtn.disabled = false;
          runBtn.querySelector('span').textContent = 'Spustiť sťahovanie';
        }
      });

      loadStats();
    </script>
  </body>
</html>
